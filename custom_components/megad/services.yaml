      name: Include Port Test
      description: "Включить тестирование портов"
      required: false
      default: false
      selector:
        boolean:

# ✅ СЕРВИС ДЛЯ НАСТРОЙКИ WATCHDOG
configure_watchdog:
  name: Configure Watchdog
  description: Настроить параметры watchdog для контроллера
  fields:
    entity_id:
      name: Entity
      description: "Entity ID контроллера MegaD"
      required: true
      selector:
        entity:
          integration: megad
    inactivity_timeout:
      name: Inactivity Timeout
      description: "Таймаут неактивности в секундах (по умолчанию 300)"
      required: false
      default: 300
      selector:
        number:
          min: 60
          max: 3600
          step: 30
          mode: slider
    check_interval:
      name: Check Interval
      description: "Интервал проверки в секундах (по умолчанию 30)"
      required: false
      default: 30
      selector:
        number:
          min: 10
          max: 300
          step: 5
          mode: slider
    max_failures:
      name: Max Failures
      description: "Максимальное количество ошибок перед восстановлением (по умолчанию 3)"
      required: false
      default: 3
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: slider
    feedback_enabled:
      name: Feedback Enabled
      description: "Включить отслеживание обратной связи"
      required: false
      default: true
      selector:
        boolean:
    feedback_timeout:
      name: Feedback Timeout
      description: "Таймаут обратной связи в секундах (по умолчанию 300)"
      required: false
      default: 300
      selector:
        number:
          min: 60
          max: 3600
          step: 30
          mode: slider